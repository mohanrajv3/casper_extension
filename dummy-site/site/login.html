<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitNest - Login</title>
  <link rel="stylesheet" href="/site/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">FitNest</div>
    <nav>
      <a href="/">Home</a>
      <a href="/workouts">Workouts</a>
      <a href="/login" class="active">Login</a>
      <a href="/register">Register</a>
    </nav>
  </header>

  <main class="page narrow">
    <form id="loginForm" class="card">
      <h1>Login</h1>
      <p class="muted">Use this to demo normal and wrong-password login events.</p>

      <input id="service" type="hidden" />

      <label>Username</label>
      <input id="username" type="text" placeholder="demo.user" required />

      <label>Password</label>
      <input id="password" type="password" placeholder="Enter password" required />

      <button type="submit">Sign In</button>
      <p id="result" class="result"></p>
      <p class="muted tiny">Demo account: <strong>demo.user / DemoPass@123</strong></p>
    </form>

    <section class="card">
      <h2>Passkey Login</h2>
      <p class="muted">Sign in with previously registered passkey.</p>
      <label>Identifier (Email / Mobile)</label>
      <input id="passkeyLoginIdentifier" type="text" placeholder="you@example.com or +91..." />
      <button type="button" id="registerPasskeyFromLoginBtn" class="secondary-action">Register Passkey</button>
      <button type="button" id="loginWithPasskeyBtn" class="secondary-action">Sign In with Passkey</button>
      <p id="passkeyLoginResult" class="result"></p>
    </section>
  </main>

  <script src="/site/app.js"></script>
</body>
</html>
